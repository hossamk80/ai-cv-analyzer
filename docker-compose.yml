# =====================================================================
# BLOCK: DOCKER COMPOSE (docker-compose.yml)
# ---------------------------------------------------------------------
# One command starts everything:   docker compose up --build
# Then open http://localhost:8501
#
# The local ./data folder is ATTACHED to the container (read-only)
# instead of being copied into the image, so your CV files stay on
# your machine and the image stays free of personal data.
# =====================================================================
# ===== 
# الطريقة المختصرة الذكية: باستخدام Docker Composeإذا كنت تستخدم أداة Docker Compose عبر ملف docker-compose.yml،
#فإن هذه الأداة تختصر عليك كل الأوامر أعلاه
#(البناء، التشغيل، وإعادة البناء للتحديث) في أمر واحد فقط:للبناء والتشغيل لأول مرة (أو للتحديث وإعادة البناء تلقائياً بعد تعديل الكود):
# bashdocker compose up --build -d
# Use code with caution.لإعادة التشغيل فقط:
# bashdocker compose restart
# Use code with caution.لإيقاف وحذف الخدمات بالكامل:
# bashdocker compose down
# ===== 
services:
  cv-analyzer:
    build: .
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data:ro
    restart: unless-stopped
