name: Deploy Streamlit App

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Cache pip packages
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run linting checks
      run: |
        pip install pylint
        pylint src/ --disable=C0111,C0103,R0903 || true

    - name: Test imports
      run: |
        python -c "from src.extract_cv_data import extract_all_data; print('✓ extract_cv_data imported successfully')"
        python -c "import streamlit; print('✓ Streamlit imported successfully')"

    - name: Create deployment artifact
      run: |
        mkdir -p build
        cp -r src build/
        cp -r data build/ || true
        cp requirements.txt build/
        mkdir -p build/.streamlit
        cp .streamlit/config.toml build/.streamlit/ || true
        echo "Deployment package ready"

    - name: Upload artifact
      uses: actions/upload-artifact@v3
      with:
        name: streamlit-app
        path: build/
        retention-days: 30

    - name: Notify deployment status
      if: always()
      run: |
        echo "✓ Build Status: ${{ job.status }}"
        echo "✓ Commit: ${{ github.sha }}"
        echo "✓ Branch: ${{ github.ref }}"
